<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">
	<head>
		<title>Cars</title>
		<meta charset="utf-8">
		<meta name = "format-detection" content = "telephone=no" />
		<link rel="icon" href="images/favicon.ico">
		<link rel="shortcut icon" href="images/favicon.ico" />
		<link rel="stylesheet" href="css/touchTouch.css">
		<link rel="stylesheet" href="css/style.css">
		<script src="js/jquery.js"></script>
		<script src="js/jquery-migrate-1.2.1.js"></script>
		<script src="js/script.js"></script>
		<script src="js/superfish.js"></script>
		<script src="js/jquery.ui.totop.js"></script>
		<script src="js/jquery.equalheights.js"></script>
		<script src="js/jquery.mobilemenu.js"></script>
		<script src="js/jquery.easing.1.3.js"></script>
		<script src="js/touchTouch.jquery.js"></script>
		<script>
			$(document).ready(function(){
				$().UItoTop({ easingType: 'easeOutQuart' });
				$('.gallery a.gal').touchTouch();
			});
		</script>
		
	</head>
	<body class="" id="top">
		<div class="main">
		
<!--==============================header-start=================================-->
	<div th:insert="~{fragments/header.html}" ></div>
				
<!--==============================header=================================-->
	
<!--==============================Content=================================-->
			<div class="content"><div class="ic">More Website Templates @ TemplateMonster.com - April 07, 2014!</div>
			 <div class="container_12">

        <div class="grid_4" th:each="car : ${allcars}">
            <div class="box">
                <div class="maxheight">

                    <img th:src="@{mycar/{imagename}(imagename=${car.carImage})}" alt="">

                    <div class="text1 color2">
                        <a href="#" th:text="${car.carName}"></a>
                    </div>

                    <a th:href="@{/carDetails/{id}(id=${car.id})}" class="btn">
                        Read More Details And Book
                    </a>

                   

                </div>
            </div>
        </div>

        <div class="clear"></div>
    </div>
</div>
		</div>
<!--==============================footer=================================-->
	<div th:insert="~{fragments/footer.html}" ></div>
		
<!--==============================footer=================================-->
		
	</body>
</html>
