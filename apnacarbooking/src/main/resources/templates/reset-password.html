<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Your Password</title>
    <link rel="stylesheet" th:href="@{/customcss/auth.css}">
</head>
<body>

    <div class="auth-container">
        <h2>Set New Password</h2>
        <p style="text-align: center; color: #718096; font-size: 14px; margin-bottom: 20px;">
            Please enter your new password below.
        </p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}" style="color: red; margin-bottom: 10px;"></div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}" />

            <div style="margin-bottom: 15px;">
                <input type="password" name="password" id="password" 
                       placeholder="New Password" required 
                       style="width: 100%; padding: 10px; margin-bottom: 10px;"/>
                
                <input type="password" name="confirmPassword" id="confirmPassword" 
                       placeholder="Confirm New Password" required 
                       style="width: 100%; padding: 10px;"/>
            </div>

            <button type="submit" style="width: 100%; padding: 10px; background-color: #3182ce; color: white; border: none; cursor: pointer;">
                Update Password
            </button>
        </form>

        <hr>
        <p style="text-align: center;">
            <a th:href="@{/login}">Back to Login</a>
        </p>
    </div>
<script>
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    function validatePassword(){
      if(password.value != confirmPassword.value) {
        confirmPassword.setCustomValidity("Passwords Don't Match");
      } else {
        confirmPassword.setCustomValidity('');
      }
    }

    password.onchange = validatePassword;
    confirmPassword.onkeyup = validatePassword;
</script>
</body>
