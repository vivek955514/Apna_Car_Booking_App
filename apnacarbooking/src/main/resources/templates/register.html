<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account - Apna Car Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .reg-container { width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ccc; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .reg-container h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-reg { width: 100%; padding: 10px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn-reg:hover { background: #555; }
        .msg-error { color: red; text-align: center; }
    </style>
</head>
<body>

    <div class="reg-container">
        <h2>Create Account</h2>
        
        <p th:if="${error}" class="msg-error" th:text="${error}"></p>

       <form th:action="@{/register}" th:object="${regDto}" method="post">
    <div>
        <label>Username:</label>
        <input type="text" th:field="*{username}" />
        <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red;"></p>
    </div>
    
    <div class="form-group">
        <label>Email Address:</label>
        <input type="email" th:field="*{useremail}" placeholder="example@mail.com" />
        <p th:if="${#fields.hasErrors('useremail')}" th:errors="*{useremail}" style="color:red;"></p>
    </div>
    
    <div>
        <label>Password:</label>
        <input type="password" th:field="*{password}" />
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></p>
    </div>
    
    <div>
        <label>Confirm Password:</label>
        <input type="password" th:field="*{confirmPassword}" />
        <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" style="color:red;"></p>
    </div>
    
    <button type="submit">Register</button>
</form>

        <p style="text-align: center; margin-top: 15px;">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>

</body>
</html>
