<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>login form</title>
<link rel="stylesheet" th:href="@{/customcss/auth.css}">
</head>
<body>

	<div class="auth-container">
		<h2>Login Form</h2>
		 <p th:if="${message}" style="color: green;" th:text="${message}"></p>
		<p
			style="text-align: center; color: #718096; font-size: 14px; margin-bottom: 20px;">Please
			sign in to continue</p>

		<div th:if="${param.error}" class="alert alert-error">Invalid
			username or password</div>

		<div th:if="${logout}" class="alert alert-success">You have been
			logged out</div>

		<form th:action="@{/login}" method="post">
			<input type="text" name="username" placeholder="Username" required />
			<input type="password" name="password" placeholder="Password"
				required />

			<div style="text-align: right; margin-bottom: 15px;">
				<a th:href="@{/forgot-password}"
					style="font-size: 13px; color: #3182ce;">Forgot Password?</a>
			</div>
			<button type="submit">Login</button>
		</form>

		<hr>
		<p>
			Don't have an account? <a href="/register">Create User Account</a>
		</p>
	</div>

</body>
</html>
