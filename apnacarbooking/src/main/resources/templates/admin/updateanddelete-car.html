<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Car Inventory Management</title>
    <link rel="stylesheet" href="/customcss/style.css">
</head>
<body>

    <div class="container">
        <h2>Car Inventory Management</h2>
        <a href="dashboard" class="btn-home">← BACK TO ADMIN HOME</a>

        <div th:if="${msg}" class="msg" th:text="${msg}"></div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Category</th>
                        <th>Car Name</th>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Price</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="c : ${cars}">
                        <td th:text="${c.id}" style="font-weight: bold; color: #7f8c8d;"></td>
                        
                        <td>
                            <img th:src="@{/mycar/{imagename}(imagename=${c.carImage})}" alt="Car Image">
                        </td>

                        <td th:text="${c.category}"></td>
                        <td th:text="${c.carName}" style="font-weight: 600;"></td>
                        <td th:text="${c.brand}"></td>
                        <td th:text="${c.model}"></td>
                        <td th:text="${'$' + c.price}"></td>
                        
                        <td class="desc-col" th:title="${c.description}" th:text="${c.description}"></td>
                        
                        <td>
                            <span class="status-pill" th:text="${c.status}"></span>
                        </td>

                        <td>
                            <a th:href="@{/admin/editCar/{id}(id=${c.id})}" class="btn-action btn-update">Update</a> 
                            <a th:href="@{/admin/deleteCar/{id}(id=${c.id})}" 
                               class="btn-action btn-delete"
                               onclick="return confirm('Are you sure you want to delete this car? This action cannot be undone.')">
                                Delete
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
