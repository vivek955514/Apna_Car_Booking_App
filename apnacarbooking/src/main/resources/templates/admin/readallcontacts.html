<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Contacts</title>
    <link rel="stylesheet" href="/customcss/style.css">
</head>
<body>

    <div class="container">
        <a href="dashboard" class="btn-home">← BACK TO DASHBOARD</a>
        
        <h2>CONTACT INQUIRIES</h2>

        <div th:if="${message}" class="alert-msg" th:text="${message}"></div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>NAME</th>
                    <th>EMAIL</th>
                    <th>PHONE</th>
                    <th>MESSAGE</th>
                    <th style="text-align: center;">ACTION</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="contact : ${allcontact}">
                    <td th:text="${contact.id}"></td>
                    <td style="font-weight: 600;" th:text="${contact.name}"></td>
                    <td>
                        <a th:href="'mailto:' + ${contact.email}" 
                           th:text="${contact.email}" 
                           style="color: #3498db; text-decoration: none;"></a>
                    </td>
                    <td>
                        <span class="phone-badge" th:text="${contact.phone}"></span>
                    </td>
                    <td class="contact-msg-cell" th:text="${contact.message}"></td>
                    <td style="text-align: center;">
                        <a th:href="@{/admin/deleteContact/{id}(id=${contact.id})}" 
                           class="btn-delete"
                           onclick="return confirm('Are you sure you want to delete this contact?')">
                            DELETE
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
