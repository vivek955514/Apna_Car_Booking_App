<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Credentials</title>
    <link rel="stylesheet" th:href="@{/customcss/auth.css}">
</head>
<body>

<div class="auth-container">
    <h2>Update Credentials</h2>
    <a href="dashboard" class="auth-nav-link">← ADMIN HOME</a>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/admin/updateCredentials}" method="post">
        
        <div class="form-group">
            <label>Old Username:</label>
            <input type="text" name="oldusername" required>
        </div>

        <div class="form-group">
            <label>Old Password:</label>
            <input type="password" name="oldpassword" required>
        </div>

        <hr>

        <div class="form-group">
            <label>New Username:</label>
            <input type="text" name="newusername" required>
        </div>

        <div class="form-group">
            <label>New Password:</label>
            <input type="password" name="newpassword" required>
        </div>

        <button type="submit">Update Credentials</button>
    </form>
</div>

</body>
</html>
